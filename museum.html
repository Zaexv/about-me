<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Eduardo Pertierra — 3D Museum</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="museum.css">
</head>
<body>

  <!-- Loading -->
  <div id="loading-screen">
    <div class="loader-col">
      <div class="loader-ring"></div>
      <p>Entering the museum…</p>
    </div>
  </div>

  <!-- CSS3D layer (renders behind WebGL) -->
  <div id="css3d-container"></div>

  <!-- WebGL layer (transparent, renders on top) -->
  <canvas id="museum-canvas"></canvas>

  <!-- Room transition flash -->
  <div id="room-flash"></div>

  <!-- Navigation UI (only non-3D elements) -->
  <nav id="museum-nav">
    <button id="nav-prev" class="nav-arrow" disabled aria-label="Previous">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div id="nav-dots"></div>
    <button id="nav-next" class="nav-arrow" aria-label="Next">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </nav>
  <div id="room-label"></div>
  <a href="index.html" id="back-link">← Portfolio</a>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
  <script src="js/museum.js"></script>
</body>
</html>
